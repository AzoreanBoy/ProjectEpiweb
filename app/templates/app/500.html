{% extends 'app/base.html' %}
{% load static %}
{% block content %}
<nav class="relative container mx-auto px-6 py-2 border-b-slate-900/10 border-b-2 border-x-0">
    <div class="flex items-center justify-between">
        <a href="{% url 'index' %}"
           class="text-5xl text-slate-800 font-bold font-mono">EPIWEB</a>
        <div class="flex flex-row justify-between">
            <p class="flex self-center text-slate-900 font-bold">{{ request.user }} |</p>
            <div onclick="openNotFunction('notpanel')"
                 class="self-center px-6 stroke-2 stroke-slate-900 hover:stroke-blue-600 hover:cursor-pointer transition-all">
                <svg id="bell" class="h-6 w-6" fill="none" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0" />
                </svg>
            </div>
            {% comment %} button {% endcomment %}
            <a href="{% url 'logoutUser' %}"
               class="flex rounded-xl p-2 w-fit text-slate-900 font-bold ring-4 ring-white hover:bg-slate-800 hover:text-blue-600 hover:ring-blue-600 hover:shadow-sm transition-all">Logout</a>
        </div>
    </div>
</nav>
<section>
    <div class="py-8 px-4 mx-auto my-8 max-w-screen-xl lg:py-16 lg:px-6">
        <div class="mx-auto max-w-screen-sm text-center">
            <img class="w-1/2 my-4 mx-auto" src="{% static 'app/img/error_500.svg' %}" alt="image description">
            <h1 class="mb-4 text-7xl tracking-tight font-extrabold lg:text-9xl text-blue-600">500</h1>
            <p class="mb-4 text-3xl tracking-tight font-bold text-gray-900 md:text-4xl">An error occured.</p>
            <p class="mb-4 text-lg font-light text-gray-500">EPIWEB administration has been notified. We apologize for the inconvenience.</p>
            <a href="{% url 'index' %}" class="inline-flex text-white bg-blue-600 hover:bg-slate-800 shadow-lg hover:shadow-xl focus:ring-4 focus:outline-none focus:ring-blue-300 font-bold rounded-lg text-sm px-5 py-2.5 text-center my-4 transition-all">Back to Homepage</a>
        </div>   
    </div>
</section>
{% endblock content %}
